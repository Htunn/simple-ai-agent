apiVersion: v1
kind: Secret
metadata:
  name: {{ include "simple-ai-agent.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "simple-ai-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  GITHUB_TOKEN: {{ .Values.secrets.githubToken | quote }}
  TELEGRAM_TOKEN: {{ .Values.secrets.telegramToken | quote }}
  TELEGRAM_WEBHOOK_SECRET: {{ .Values.secrets.telegramWebhookSecret | quote }}
  SLACK_BOT_TOKEN: {{ .Values.secrets.slackBotToken | quote }}
  SLACK_SIGNING_SECRET: {{ .Values.secrets.slackSigningSecret | quote }}
  GRAFANA_API_KEY: {{ .Values.secrets.grafanaApiKey | quote }}
  ALERTMANAGER_WEBHOOK_SECRET: {{ .Values.secrets.alertmanagerWebhookSecret | quote }}
  {{- if not .Values.postgresql.enabled }}
  DATABASE_URL: {{ required "secrets.externalDatabaseUrl is required when postgresql.enabled=false" .Values.secrets.externalDatabaseUrl | quote }}
  {{- end }}
